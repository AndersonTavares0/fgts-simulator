# Workflow de verificação automática em PRs
name: PR Summary

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - id: typecheck
        name: Type check
        run: npm run typecheck

      - id: tests
        name: Run tests
        run: npm test -- --run

      - id: lint
        name: Lint
        run: npm run lint

      - id: build
        name: Build
        run: npm run build

      - id: audit
        name: Security audit
        continue-on-error: true
        run: npm audit --audit-level=moderate

      - name: Post check results
        uses: actions/github-script@v7
        with:
          script: |
            const steps = ${{ toJSON(steps) }};
            const s = (id) => steps[id]?.outcome ?? steps[id]?.conclusion ?? 'skipped';
            const results = [
              `- **Type check**: ${s('typecheck')}`,
              `- **Tests**: ${s('tests')}`,
              `- **Lint**: ${s('lint')}`,
              `- **Build**: ${s('build')}`,
              `- **Security audit**: ${s('audit')}`,
            ];
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Resultados da Verificação Automática\n\n${results.join('\n')}`
            });
