# Workflow de verificação automática em PRs
name: PR Summary

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test -- --run

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Security audit
        run: npm audit --audit-level=moderate

      - name: Post check results
        uses: actions/github-script@v7
        with:
          script: |
            const steps = ${{ toJSON(steps) }};
            const results = [
              `- **Type check**: ${steps.typecheck.outcome}`,
              `- **Tests**: ${steps.run_tests.outcome}`,
              `- **Lint**: ${steps.lint.outcome}`,
              `- **Build**: ${steps.build.outcome}`,
              `- **Security audit**: ${steps.security_audit.outcome}`,
            ];
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Resultados da Verificação Automática\n\n${results.join('\n')}`
            });
